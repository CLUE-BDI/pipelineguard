apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure-app
  template:
    metadata:
      labels:
        app: insecure-app
    spec:
      containers:
        - name: insecure-app
          image: nginx:latest
          ports:
            - containerPort: 80
          securityContext:
            privileged: true
          env:
            - name: PASSWORD
              value: "plaintextpassword"
