site_name: PipelineGuard Documentation
site_description: Technical documentation, architecture guides, and setup instructions for PipelineGuard.
site_author: CLUE-BDI Team

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: indigo
      accent: indigo
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - toc.integrate
  highlightjs: true

nav:
  - Welcome: index.md
  - Developer Setup Guide: dev_guide.md
  - Deployment Guide: deploy_guide.md
