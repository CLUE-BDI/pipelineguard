stages:
  - scan
  - normalize
  - correlate
  - validate
  - publish

default:
  image: python:3.12-slim
  before_script:
    - apt-get update
    - apt-get install -y curl git jq ca-certificates gnupg wget build-essential
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync

    # Gitleaks
    - export GITLEAKS_VERSION="8.30.0"
    - wget -O gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
    - tar -xzf gitleaks.tar.gz
    - install -m 0755 gitleaks /usr/local/bin/gitleaks
    - gitleaks version

    # Trivy
    - wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor > /usr/share/keyrings/trivy.gpg
    - echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb bookworm main" > /etc/apt/sources.list.d/trivy.list
    - apt-get update
    - apt-get install -y trivy
    - trivy --version

    # PipelineGuard target settings
    - export TARGET_REPO_NAME="vulnerable-infra-project"
    - export TARGET_REPO_PATH="$CI_PROJECT_DIR/vulnerable-infra-project"
    - export PG_REPO="$TARGET_REPO_NAME"
    - export PG_BRANCH="${CI_COMMIT_REF_NAME}"
    - export PG_COMMIT_SHA="${CI_COMMIT_SHA}"
    - export PG_PIPELINE_ID="${CI_PIPELINE_ID}"
    - export PG_ENVIRONMENT="ci"

    - mkdir -p outputs normalized .trivycache
    - chmod +x scripts/*.sh || true

    # Sanity/debug
    - echo "TARGET_REPO_NAME=$TARGET_REPO_NAME"
    - echo "TARGET_REPO_PATH=$TARGET_REPO_PATH"
    - test -n "$TARGET_REPO_NAME"
    - test -n "$TARGET_REPO_PATH"
    - test -d "$TARGET_REPO_PATH"
    - ls -la "$TARGET_REPO_PATH"
    - find "$TARGET_REPO_PATH" -maxdepth 3 -type f | sort | head -100

variables:
  GIT_SUBMODULE_STRATEGY: none
  UV_PYTHON: "3.12"
  MAX_CRITICAL: "0"
  MAX_HIGH: "999999"
  FAIL_ON_SECRET: "true"

  # GCP
  GCP_PROJECT_ID: "datawarehouse-486704"
  GCS_BUCKET: "pipelineguard-artifacts"
  BQ_DATASET: "pipelineguard_analytics"
  BQ_FINDINGS_TABLE: "findings_normalized"
  BQ_INCIDENTS_TABLE: "incidents"

cache:
  key: trivy-cache
  paths:
    - .trivycache/

scan:
  stage: scan
  script:
    - ./scripts/run_phase1.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/

normalize:
  stage: normalize
  needs:
    - job: scan
      artifacts: true
  script:
    - ./scripts/run_phase2.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/
      - normalized/

correlate:
  stage: correlate
  needs:
    - job: normalize
      artifacts: true
  script:
    - uv run python -m scripts.correlate_findings
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/
      - normalized/
      - correlated/

validate_correlation:
  stage: validate
  needs:
    - job: correlate
      artifacts: true
  script:
    - uv run python -m scripts.validate_correlation
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/
      - normalized/
      - correlated/

validate_findings:
  stage: validate
  needs:
    - job: normalize
      artifacts: true
  script:
    - uv run python -m scripts.validate_findings
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/
      - normalized/

threshold_check:
  stage: validate
  needs:
    - job: normalize
      artifacts: true
  script:
    - uv run python -m scripts.enforce_thresholds
  allow_failure: true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/
      - normalized/

publish_artifacts:
  stage: publish
  needs:
    - job: validate_findings
      artifacts: true
    - job: threshold_check
      artifacts: true
    - job: validate_correlation
      artifacts: true
  script:
    - echo "Output artifacts:"
    - find outputs -maxdepth 3 -type f | sort
    - echo "Normalized artifacts:"
    - find normalized -maxdepth 3 -type f | sort
    - echo "Correlated artifacts:"
    - find correlated -maxdepth 3 -type f | sort
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - outputs/
      - normalized/
      - correlated/

export_to_gcs:
  stage: publish
  image: google/cloud-sdk:slim
  needs:
    - job: publish_artifacts
      artifacts: true
  before_script:
    - echo "$GCP_SA_KEY_JSON" > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - export TARGET_REPO_NAME="vulnerable-infra-project"
  script:
    - gsutil -m cp -r outputs "gs://${GCS_BUCKET}/raw/${CI_PROJECT_NAME}/${CI_COMMIT_REF_NAME}/${CI_PIPELINE_ID}/"
    - gsutil -m cp -r normalized "gs://${GCS_BUCKET}/normalized/${CI_PROJECT_NAME}/${CI_COMMIT_REF_NAME}/${CI_PIPELINE_ID}/"
    - gsutil -m cp -r correlated "gs://${GCS_BUCKET}/correlated/${CI_PROJECT_NAME}/${CI_COMMIT_REF_NAME}/${CI_PIPELINE_ID}/"