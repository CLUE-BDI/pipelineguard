stages:
  - scan
  - normalize
  - validate
  - publish

default:
  image: python:3.12-slim
  before_script:
    - apt-get update
    - apt-get install -y curl git jq ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync
    - mkdir -p outputs normalized
    - chmod +x scripts/*.sh || true
    - set -a
    - source config/target.env
    - set +a
    - echo "TARGET_REPO_NAME=$TARGET_REPO_NAME"
    - echo "TARGET_REPO_PATH=$TARGET_REPO_PATH"
    - test -n "$TARGET_REPO_NAME"
    - test -n "$TARGET_REPO_PATH"

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  GIT_STRATEGY: fetch

scan:
  stage: scan
  script:
    - ./scripts/run_phase1.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - outputs/${TARGET_REPO_NAME}/

normalize:
  stage: normalize
  needs:
    - job: scan
      artifacts: true
  script:
    - ./scripts/run_phase2.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - normalized/${TARGET_REPO_NAME}/
      - outputs/${TARGET_REPO_NAME}/

validate:
  stage: validate
  needs:
    - job: normalize
      artifacts: true
  script:
    - uv run python -m scripts.validate_findings
    - uv run python -m scripts.enforce_thresholds
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - normalized/${TARGET_REPO_NAME}/
      - outputs/${TARGET_REPO_NAME}/

publish_artifacts:
  stage: publish
  needs:
    - job: validate
      artifacts: true
  script:
    - echo "Artifacts ready for export"
    - find outputs/${TARGET_REPO_NAME} -maxdepth 1 -type f | sort
    - find normalized/${TARGET_REPO_NAME} -maxdepth 1 -type f | sort
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - outputs/${TARGET_REPO_NAME}/
      - normalized/${TARGET_REPO_NAME}/